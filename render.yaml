services:
  - type: web
    name: fingenius
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --proxy-headers
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # set this in the Render dashboard, never commit it
